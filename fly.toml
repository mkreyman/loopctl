# Fly.io deployment configuration for loopctl
# See https://fly.io/docs/reference/configuration/

app = "loopctl"
primary_region = "lax"

[build]
  [build.args]
    MIX_ENV = "prod"

[deploy]
  release_command = "/app/bin/migrate"

[env]
  PHX_HOST = "loopctl.com"
  PORT = "8080"
  PHX_SERVER = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

  [http_service.http_options]
    h2_backend = false

  [[http_service.checks]]
    interval = "10s"
    timeout = "2s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
