# Nginx reverse proxy configuration for loopctl
# Install: sudo cp deploy/nginx.conf /etc/nginx/sites-available/loopctl
#          sudo ln -s /etc/nginx/sites-available/loopctl /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

upstream loopctl_backend {
    server 127.0.0.1:4000;
}

server {
    listen 80;
    server_name loopctl.local;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name loopctl.local;

    # TLS certificates — update paths for your environment
    ssl_certificate /etc/ssl/certs/loopctl.local.pem;
    ssl_certificate_key /etc/ssl/private/loopctl.local-key.pem;

    # TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Request size limit (for bulk import payloads)
    client_max_body_size 10M;

    # Proxy to Phoenix
    location / {
        proxy_pass http://loopctl_backend;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for future Phoenix Channels)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint — allow from anywhere
    location = /health {
        proxy_pass http://loopctl_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        access_log off;
    }
}
